apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ratio-ingress
  namespace: ratio
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: ratio.local
    http:
      paths:
      - path: /api/prompts
        pathType: Prefix
        backend:
          service:
            name: prompt-management-service
            port:
              number: 8081
      - path: /api/execute
        pathType: Prefix
        backend:
          service:
            name: execution-engine-service
            port:
              number: 8082
      - path: /api/cost
        pathType: Prefix
        backend:
          service:
            name: cost-tracker-service
            port:
              number: 8083
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 3000