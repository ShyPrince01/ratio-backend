apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompt-management
  namespace: ratio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prompt-management
  template:
    metadata:
      labels:
        app: prompt-management
    spec:
      containers:
      - name: prompt-management
        image: ratio/prompt-management:latest
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "k8s"
---
apiVersion: v1
kind: Service
metadata:
  name: prompt-management-service
  namespace: ratio
spec:
  selector:
    app: prompt-management
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP