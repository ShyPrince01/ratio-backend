spring:
  cloud:
    gateway:
      routes:
        - id: prompt-management
          uri: ${PROMPT_MANAGEMENT_URL}
          predicates:
            - Path=/api/prompts/**
        - id: execution-engine
          uri: ${EXECUTION_ENGINE_URL}
          predicates:
            - Path=/api/execute/**
        - id: cost-tracker
          uri: ${COST_TRACKER_URL}
          predicates:
            - Path=/api/cost/**
        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/api/auth/**