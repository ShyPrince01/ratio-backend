server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: prompt-management
          uri: http://localhost:8081
          predicates:
            - Path=/api/prompts/**
        - id: execution-engine
          uri: http://localhost:8082
          predicates:
            - Path=/api/execute/**
        - id: cost-tracker
          uri: http://localhost:8083
          predicates:
            - Path=/api/cost/**
        - id: auth-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/auth/**