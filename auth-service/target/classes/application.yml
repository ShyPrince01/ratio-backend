server:
  port: 8084

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

app:
  jwt:
    secret: ratio-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration: 86400000