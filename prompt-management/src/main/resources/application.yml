server:
  port: 8081

spring:
  application:
    name: prompt-management
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:promptdb}
    username: ${DATABASE_USER:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_URL:org.h2.Driver:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: update